# Cargo build configuration for OpenCode Indexer
#
# Enables CPU-specific optimizations including SIMD (AVX2/SSE) for vector operations.
# The indexer will automatically detect and use the best instruction set available.

[build]
# Enable native CPU optimizations (AVX2, SSE, FMA) for SIMD vector operations
# This significantly improves cosine similarity performance in search reranking.
#
# On x86_64 with AVX2: ~8x faster than scalar for 768-dim vectors
# On x86_64 with SSE: ~4x faster than scalar
# On other platforms: uses portable scalar fallback
rustflags = ["-C", "target-cpu=native"]

# Alternative: target specific features manually
# rustflags = ["-C", "target-feature=+avx2,+fma"]
